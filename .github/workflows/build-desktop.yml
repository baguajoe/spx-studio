name: Build SPX Studio Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: npm install --legacy-peer-deps
      - name: Build Tauri app
        run: npx tauri build
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: spx-studio-linux
          path: src-tauri/target/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: npm install --legacy-peer-deps
      - name: Build Tauri app
        run: npx tauri build
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: spx-studio-windows
          path: src-tauri/target/release/bundle/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm deps
        run: npm install --legacy-peer-deps
      - name: Build Tauri app
        run: npx tauri build
      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: spx-studio-macos
          path: src-tauri/target/release/bundle/
